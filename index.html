<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف إسلام و سحر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1e0033; /* بنفسجي داكن جداً */
            --card-bg: #2d004d;
            --text-white: #ffffff;
            --accent-gold: #d4af37;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-white);
            text-align: center;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            background: linear-gradient(rgba(30, 0, 51, 0.7), rgba(30, 0, 51, 0.9)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=1000') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .hero h2 { font-family: 'Amiri', serif; font-size: 1.5rem; color: var(--accent-gold); margin-bottom: 5px; }
        .hero h1 { font-family: 'Amiri', serif; font-size: 4.5rem; margin: 10px 0; font-weight: bold; }
        
        .event-info {
            margin-top: 20px;
            font-size: 1.3rem;
            line-height: 1.8;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding-top: 20px;
        }

        /* Custom Photo Layout */
        .gallery-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 15px;
        }

        .top-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .photo-box {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .top-row .photo-box {
            flex: 1; /* يوزع المساحة بالتساوي بين الصورة اليمين واليسار */
        }

        .bottom-row .photo-box {
            width: 100%;
        }

        .photo-box img {
            width: 100%;
            height: 250px; /* طول الصور العلوية */
            object-fit: cover;
            display: block;
            transition: 0.4s;
        }

        .bottom-row img {
            height: 350px; /* طول الصورة السفلية لتميزها */
        }

        .photo-box img:hover {
            transform: scale(1.05);
        }

        /* Map Section */
        .location-section {
            padding: 60px 20px;
            background-color: var(--card-bg);
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .location-title {
            font-family: 'Amiri', serif;
            font-size: 2.2rem;
            color: var(--accent-gold);
            margin-bottom: 15px;
        }

        .map-wrapper {
            max-width: 550px;
            margin: 30px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .map-frame {
            width: 100%;
            height: 400px;
            border: 0;
            display: block;
        }

        .map-btn {
            display: inline-block;
            background-color: transparent;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 30px;
            margin-top: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        .map-btn:hover {
            background-color: var(--accent-gold);
            color: var(--primary-bg);
        }

        footer {
            padding: 60px 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .footer-names {
            font-family: 'Amiri', serif;
            font-size: 1.5rem;
            color: var(--accent-gold);
            letter-spacing: 2px;
            font-weight: bold;
        }

        .scroll-icon {
            font-size: 24px;
            margin-top: 30px;
            animation: bounce 2s infinite;
            color: var(--accent-gold);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
        }
    </style>
</head>
<body>

    <section class="hero">
        <h2>نتشرف بدعوتكم لحضور حفل زفاف</h2>
        <h1>إسلام و سحر</h1>
        <div class="event-info">
            <div>يوم السبت، ١١ يوليو ٢٠٢٦</div>
            <div>الساعة ٧:٠٠ مساءً</div>
            <div style="color: var(--accent-gold);">فندق جولدن جويل، الإسماعيلية</div>
        </div>
        <div class="scroll-icon">↓</div>
    </section>

    <div class="gallery-container">
        <h2 style="font-family: 'Amiri', serif; color: var(--accent-gold);">إطلالة القاعة</h2>
        
        <div class="top-row">
            <div class="photo-box">
                <img src="image1.jpeg" alt="View 1">
            </div>
            <div class="photo-box">
                <img src="image2.jpeg" alt="View 2">
            </div>
        </div>

        <div class="bottom-row">
            <div class="photo-box">
                <img src="image3.jpeg" alt="View 3">
            </div>
        </div>
    </div>

    <section class="location-section">
        <h2 class="location-title">اللوكيشن</h2>
        <p>فندق جولدن جويل (Golden Jewel Ismailia)</p>
        
        <div class="map-wrapper">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3434.646944682333!2d32.2855!3d30.59!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDM1JzI0LjAiTiAzMsKwMTcnMDcuOCJF!5e0!3m2!1sen!2seg!4v1620000000000!5m2!1sen!2seg" 
                class="map-frame"
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </div>

        <a href="https://www.google.com/maps/place/Golden+Jewel+Ismailia/@30.588275,32.3015104,16.72z/data=!4m9!3m8!1s0x14f859c1eb07d465:0x8a120d14d66b22fb!5m2!4m1!1i2!8m2!3d30.5880999!4d32.303391!16s%2Fg%2F11t77ng4b9?hl=en&entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D" class="map-btn" target="_blank">
            فتح في الخرائط ↗
        </a>
    </section>

    <footer>
        <p>بانتظاركم بكل حب ..</p>
        <div class="footer-names">ISLAM & SAHAR</div>
    </footer>

</body>
</html>
