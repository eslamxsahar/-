<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eslam & Sahar Wedding</title>
    
    <link rel="icon" type="image/png" href="poster.png">
    
    <meta property="og:title" content="دعوة زفاف إسلام و سحر">
    <meta property="og:description" content="نتشرف بدعوتكم لحضور حفل زفافنا في فندق جولدن جويل">
    <meta property="og:image" content="poster.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #1e0033; /* بنفسجي غامق فاخر */
            --card-bg: #2d004d;
            --text-white: #ffffff;
            --accent-gold: #d4af37;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-white);
            text-align: center;
        }

        /* الجزء العلوي - الهيرو */
        .hero {
            height: 90vh;
            background: linear-gradient(rgba(30, 0, 51, 0.75), rgba(30, 0, 51, 0.95)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=1000') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .hero h2 { font-family: 'Amiri', serif; font-size: 1.6rem; color: var(--accent-gold); margin-bottom: 5px; }
        .hero h1 { font-family: 'Amiri', serif; font-size: clamp(3rem, 10vw, 4.5rem); margin: 10px 0; font-weight: bold; }
        
        .event-info {
            margin-top: 20px;
            font-size: 1.4rem;
            line-height: 1.8;
            border-top: 1px solid rgba(212, 175, 55, 0.4);
            padding-top: 20px;
            max-width: 400px;
        }

        /* تنسيق الصور: اثنتان بالأعلى وواحدة بالأسفل */
        .gallery-container {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 15px;
        }

        .top-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .photo-box {
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .top-row .photo-box {
            flex: 1;
        }

        .bottom-row .photo-box {
            width: 100%;
        }

        .photo-box img {
            width: 100%;
            height: 300px; 
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .bottom-row img {
            height: 400px; 
        }

        .photo-box:hover img {
            transform: scale(1.08);
        }

        /* قسم الخريطة والموقع */
        .location-section {
            padding: 80px 20px;
            background-color: var(--card-bg);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }

        .location-title {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            color: var(--accent-gold);
            margin-bottom: 20px;
        }

        .map-wrapper {
            max-width: 600px;
            margin: 30px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
        }

        .map-frame {
            width: 100%;
            height: 450px;
            border: 0;
            display: block;
        }

        .map-btn {
            display: inline-block;
            background-color: transparent;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            padding: 18px 50px;
            text-decoration: none;
            border-radius: 50px;
            margin-top: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .map-btn:hover {
            background-color: var(--accent-gold);
            color: var(--primary-bg);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        footer {
            padding: 80px 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .footer-names {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            color: var(--accent-gold);
            letter-spacing: 3px;
            font-weight: bold;
        }

        .scroll-icon {
            font-size: 28px;
            margin-top: 40px;
            animation: bounce 2s infinite;
            color: var(--accent-gold);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-12px);}
        }
    </style>
</head>
<body>

    <section class="hero">
        <h2>نتشرف بدعوتكم لحضور حفل زفاف</h2>
        <h1>إسلام & سحر</h1>
        <div class="event-info">
            <div>يوم السبت، ١١ يوليو ٢٠٢٦</div>
            <div>الساعة ٧:٠٠ مساءً</div>
            <div style="color: var(--accent-gold); font-weight: bold;">فندق جولدن جويل، الإسماعيلية</div>
        </div>
        <div class="scroll-icon">↓</div>
    </section>

    <div class="gallery-container">
        <h2 style="font-family: 'Amiri', serif; color: var(--accent-gold); margin-bottom: 30px;">إطلالة القاعة</h2>
        
        <div class="top-row">
            <div class="photo-box">
                <img src="image1.jpeg" alt="فندق جولدن جويل 1">
            </div>
            <div class="photo-box">
                <img src="image2.jpeg" alt="فندق جولدن جويل 2">
            </div>
        </div>

        <div class="bottom-row">
            <div class="photo-box">
                <img src="image3.jpeg" alt="فندق جولدن جويل 3">
            </div>
        </div>
    </div>

    <section class="location-section">
        <h2 class="location-title">اللوكيشن</h2>
        <p style="font-size: 1.2rem;">فندق جولدن جويل (Golden Jewel Hotel)</p>
        <p style="opacity: 0.8;">الإسماعيلية - طريق البلاجات</p>
        
        <div class="map-wrapper">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3434.615286570653!2d32.2858100753675!3d30.58838387465365!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14f859580447171d%3A0x96696e574f884a44!2sGolden%20Jewel%20Hotel%20Ismailia!5e0!3m2!1sen!2seg!4v1713000000000!5m2!1sen!2seg" 
                class="map-frame"
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </div>

        <a href="https://maps.app.goo.gl/9S5E5n2P1U6z9oY68" class="map-btn" target="_blank">
            فتح في خرائط جوجل ↗
        </a>
    </section>

    <footer>
        <p>بانتظاركم بكل حب ..</p>
        <div class="footer-names">ESLAM & SAHAR</div>
    </footer>

</body>
</html>
